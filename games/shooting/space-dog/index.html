<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Space Dog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }
    #game-container { width: 100%; height: 100%; position: relative; overflow: hidden; }

    /* ── Landscape-only gate (Space Dog only) ── */
    #landscape-gate {
      display: none;           /* hidden by default (landscape) */
      position: fixed; inset: 0;
      z-index: 9999;
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      text-align: center;
      padding: 2rem;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    /* Show when portrait */
    @media (orientation: portrait) {
      #landscape-gate { display: flex; }
    }
    .rotate-icon {
      font-size: clamp(3.5rem, 14vw, 6rem);
      animation: rotate-hint 1.8s ease-in-out infinite;
    }
    @keyframes rotate-hint {
      0%   { transform: rotate(0deg);   }
      40%  { transform: rotate(90deg);  }
      60%  { transform: rotate(90deg);  }
      100% { transform: rotate(0deg);   }
    }
    .rotate-title {
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      font-weight: 700;
      color: #00ccff;
      letter-spacing: 1px;
      text-shadow: 0 0 16px rgba(0,200,255,0.5);
    }
    .rotate-sub {
      font-size: clamp(0.78rem, 2.5vw, 1rem);
      color: rgba(255,255,255,0.5);
      max-width: 280px;
      line-height: 1.5;
    }
    /* Starfield behind the overlay */
    .rotate-stars {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    .rotate-stars::before, .rotate-stars::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 60% 15%, rgba(255,255,255,.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 50%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 85%, rgba(255,255,255,.6) 0%, transparent 100%);
    }
  </style>
</head>
<body>

  <!-- Landscape-only gate — shown via @media portrait automatically -->
  <div id="landscape-gate">
    <div class="rotate-stars"></div>
    <div class="rotate-icon">📱</div>
    <p class="rotate-title">Rotate Your Device</p>
    <p class="rotate-sub">Super Space Dog is designed for landscape play. Turn your phone sideways to launch!</p>
  </div>

  <div id="game-container"></div>

  <script src="../../../core/game-shim.js"></script>

  <!-- Patch legacy asset paths → local ./scripts/assets/ -->
  <script>
    (function () {
      const LEGACY = 'games/shooting/assets/';
      const LOCAL  = 'scripts/assets/';
      const desc    = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
      const origSet = desc.set;
      Object.defineProperty(HTMLImageElement.prototype, 'src', {
        get: desc.get,
        set(val) {
          if (typeof val === 'string' && val.startsWith(LEGACY))
            val = LOCAL + val.slice(LEGACY.length);
          origSet.call(this, val);
        },
        configurable: true
      });
    })();
  </script>

  <script src="./scripts/space-dog.js"></script>
</body>
</html>
