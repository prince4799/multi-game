<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Beach Shooter - 3D</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
        }

        #canvas-container {
            width: 100%;
            height: 100vh;
            cursor: none;
        }

        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 100;
            mix-blend-mode: difference;
        }

        .crosshair::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* --- GAME HUD --- */
        .game-hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        .stats-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .question-box {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            padding: 15px 40px;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 2.2rem;
            font-weight: 900;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
        }

        .lives-container {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .heart {
            width: 24px;
            height: 24px;
            fill: #ff4757;
            filter: drop-shadow(0 0 8px rgba(255, 71, 87, 0.6));
            transition: all 0.3s;
        }

        .heart.empty {
            fill: rgba(255, 255, 255, 0.2);
            filter: none;
        }

        /* PC LAYOUT: Question Top-Left, Stats Top-Right */
        @media (min-width: 1024px) {
            .question-box {
                top: 30px;
                left: 30px;
                transform: none;
                font-size: 2.5rem;
                padding: 15px 45px;
            }

            .stats-bar {
                top: 30px;
                right: 30px;
                left: auto;
                transform: none;
                width: auto;
                min-width: 450px;
                gap: 30px;
                padding: 15px 30px;
                font-size: 1.2rem;
            }
        }

        /* MOBILE SCALING */
        @media (max-width: 768px) {
            .question-box {
                font-size: 1.6rem;
                padding: 10px 30px;
                top: 80px;
            }

            .stats-bar {
                font-size: 0.9rem;
                padding: 8px 15px;
                width: 95%;
                top: 15px;
            }

            .heart {
                width: 18px;
                height: 18px;
            }
        }

        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div id="canvas-container"></div>
    <div class="crosshair" id="crosshair"></div>

    <div class="game-hud">
        <div class="stats-bar">
            <div id="score-label">SCORE: 0</div>
            <div class="lives-container" id="lives-container">
                <!-- Hearts will be injected here -->
            </div>
            <div id="level-label">LEVEL: 1</div>
        </div>
        <div class="question-box" id="question-text">? + ?</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { Water } from 'three/examples/jsm/objects/Water.js';
        import { Sky } from 'three/examples/jsm/objects/Sky.js';
        import { RoundedBoxGeometry } from 'three/examples/jsm/geometries/RoundedBoxGeometry.js';
        import * as BufferGeometryUtils from 'three/examples/jsm/utils/BufferGeometryUtils.js';

        // --- 1. ENVIRONMENT CONFIG ---
        const THEMES = {
            DAY: { sky: 0x87ceeb, light: 1.2, amb: 0.5, sun: 0xffcc33, stars: 0, water: 0x0077be, sand: 0xe3c18d, name: 'Day', turbidity: 6, rayleigh: 1.2, elevation: 25, sound: 'https://cdn.freesound.org/previews/337/337435_5831968-lq.mp3' },
            NIGHT: { sky: 0x050510, light: 0.1, amb: 0.1, sun: 0xddddff, stars: 1, water: 0x001e3c, sand: 0x2c1e14, name: 'Night', turbidity: 20, rayleigh: 0.1, elevation: -70, sound: 'https://cdn.freesound.org/previews/337/337435_5831968-lq.mp3' },
            STORM: { sky: 0x1a252f, light: 0.3, amb: 0.2, sun: 0x444444, stars: 0, water: 0x141a1f, sand: 0x3e2c1c, name: 'Storm', turbidity: 50, rayleigh: 0.5, elevation: 30, sound: 'https://cdn.freesound.org/previews/347/347492_321967-lq.mp3' },
            DAWN: { sky: 0xff7e5f, light: 0.8, amb: 0.4, sun: 0xffaa00, stars: 0, water: 0x1e3c5a, sand: 0x5d4037, name: 'Dawn', turbidity: 10, rayleigh: 4, elevation: 5, sound: 'https://cdn.freesound.org/previews/322/322616_5553535-lq.mp3' }
        };

        const SOUND_EFFECTS = {
            shot: 'https://cdn.freesound.org/previews/174/174436_3242048-lq.mp3',
            thunder: 'https://cdn.freesound.org/previews/347/347492_321967-lq.mp3',
            correct: 'https://cdn.freesound.org/previews/131/131660_2398403-lq.mp3',
            wrong: 'https://cdn.freesound.org/previews/415/415764_6037061-lq.mp3'
        };

        // ==========================================
        // --- 1.2 MATH ENGINE ---
        // ==========================================
        class MathManager {
            constructor() {
                this.currentQuestion = "";
                this.correctAnswer = 0;
            }

            generate(level) {
                let a, b, c;
                if (level === 1) {
                    a = Math.floor(Math.random() * 10) + 1;
                    b = Math.floor(Math.random() * 10) + 1;
                    this.currentQuestion = `${a} + ${b}`;
                    this.correctAnswer = a + b;
                } else if (level === 2) {
                    a = Math.floor(Math.random() * 30) + 10;
                    b = Math.floor(Math.random() * 10) + 1;
                    this.currentQuestion = `${a} - ${b}`;
                    this.correctAnswer = a - b;
                } else if (level === 3) {
                    a = Math.floor(Math.random() * 10) + 2;
                    b = Math.floor(Math.random() * 10) + 2;
                    this.currentQuestion = `${a} × ${b}`;
                    this.correctAnswer = a * b;
                } else if (level === 4) {
                    b = Math.floor(Math.random() * 8) + 2;
                    this.correctAnswer = Math.floor(Math.random() * 10) + 1;
                    a = b * this.correctAnswer;
                    this.currentQuestion = `${a} ÷ ${b}`;
                } else if (level === 5) {
                    return Math.random() > 0.5 ? this.generate(1) : this.generate(2);
                } else if (level === 6) {
                    const r = Math.random();
                    return r < 0.33 ? this.generate(1) : (r < 0.66 ? this.generate(2) : this.generate(3));
                } else if (level >= 7) {
                    // BODMAS & Decimals
                    const r = Math.random();
                    if (r < 0.5) {
                        a = Math.floor(Math.random() * 10) + 1;
                        b = Math.floor(Math.random() * 5) + 1;
                        c = Math.floor(Math.random() * 5) + 1;
                        this.currentQuestion = `${a} + (${b} × ${c})`;
                        this.correctAnswer = a + (b * c);
                    } else {
                        a = (Math.random() * 10).toFixed(1);
                        b = (Math.random() * 10).toFixed(1);
                        this.currentQuestion = `${a} + ${b}`;
                        this.correctAnswer = parseFloat((parseFloat(a) + parseFloat(b)).toFixed(1));
                    }
                }
                return { question: this.currentQuestion, answer: this.correctAnswer };
            }

            getOptions(correct) {
                const opts = [correct];
                while (opts.length < 3) {
                    const off = (Math.random() * 5 + 1).toFixed(correct % 1 === 0 ? 0 : 1);
                    const wrong = Math.random() > 0.5 ? parseFloat(correct) + parseFloat(off) : parseFloat(correct) - parseFloat(off);
                    const finalWrong = correct % 1 === 0 ? Math.floor(wrong) : parseFloat(wrong.toFixed(1));
                    if (!opts.includes(finalWrong) && finalWrong >= 0) opts.push(finalWrong);
                }
                return opts.sort(() => Math.random() - 0.5);
            }
        }

        // --- 1.5 TEXTURE GENERATORS ---
        function createSkyTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            const center = 128;
            /*if (type === 'cloud') {
                const grad = ctx.createRadialGradient(center, center, 0, center, center, center);
                grad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                grad.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)');
                grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                ctx.fillStyle = grad; ctx.fillRect(0, 0, 256, 256);
            }  */if (type === 'cloud') {
                const imageData = ctx.createImageData(256, 256);
                const data = imageData.data;

                // simple pseudo-noise (no external lib)
                function noise(x, y) {
                    return Math.sin(x * 0.05) * Math.sin(y * 0.05);
                }

                for (let y = 0; y < 256; y++) {
                    for (let x = 0; x < 256; x++) {
                        const i = (y * 256 + x) * 4;

                        // distance from center (for soft falloff)
                        const dx = x - center;
                        const dy = y - center;
                        const dist = Math.sqrt(dx * dx + dy * dy) / center;

                        // layered noise
                        const n =
                            noise(x, y) * 0.5 +
                            noise(x * 2, y * 2) * 0.25 +
                            noise(x * 4, y * 4) * 0.125;

                        // combine falloff + noise
                        let alpha = (1 - dist) * (0.6 + n);

                        // clamp
                        alpha = Math.max(0, Math.min(1, alpha));

                        data[i] = 255;     // R
                        data[i + 1] = 255; // G
                        data[i + 2] = 255; // B
                        data[i + 3] = alpha * 255;
                    }
                }

                ctx.putImageData(imageData, 0, 0);

                // keep your existing soft gradient (important)
                const grad = ctx.createRadialGradient(center, center, 0, center, center, center);
                grad.addColorStop(0, 'rgba(255,255,255,0.6)');
                grad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, 256, 256);
            }
            else if (type === 'moon') {
                const imageData = ctx.createImageData(256, 256);
                const data = imageData.data;

                function noise(x, y) {
                    return Math.sin(x * 0.08) * Math.sin(y * 0.08);
                }

                for (let y = 0; y < 256; y++) {
                    for (let x = 0; x < 256; x++) {
                        const i = (y * 256 + x) * 4;

                        const dx = x - center;
                        const dy = y - center;
                        const dist = Math.sqrt(dx * dx + dy * dy) / center;

                        if (dist > 1) {
                            data[i + 3] = 0;
                            continue;
                        }

                        // base moon color
                        let shade = 180;

                        // surface noise (craters / roughness)
                        const n =
                            noise(x, y) * 0.5 +
                            noise(x * 2, y * 2) * 0.25 +
                            noise(x * 4, y * 4) * 0.125;

                        shade += n * 40;

                        // lighting (phase: light from right side)
                        const lightDir = 0.6; // shift for crescent/full control
                        const lighting = (dx / center + lightDir);
                        shade *= Math.max(0.2, lighting);

                        // clamp
                        shade = Math.max(120, Math.min(230, shade));

                        data[i] = shade;         // R
                        data[i + 1] = shade + 5; // G (slight cool tint)
                        data[i + 2] = shade + 20;// B (bluish night tone)
                        data[i + 3] = 255;       // alpha
                    }
                }

                ctx.putImageData(imageData, 0, 0);

                // subtle crater spots (large features)
                for (let i = 0; i < 8; i++) {
                    const cx = center + (Math.random() - 0.5) * 120;
                    const cy = center + (Math.random() - 0.5) * 120;
                    const r = Math.random() * 15 + 5;

                    const craterGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
                    craterGrad.addColorStop(0, 'rgba(120,120,120,0.4)');
                    craterGrad.addColorStop(1, 'transparent');

                    ctx.fillStyle = craterGrad;
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.fill();
                }

                // KEEP your glow (important for beach night feel)
                const grad = ctx.createRadialGradient(center, center, 0, center, center, center);
                grad.addColorStop(0, 'rgba(200,210,255,0.4)');
                grad.addColorStop(0.7, 'rgba(150,160,200,0.2)');
                grad.addColorStop(1, 'transparent');

                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, 256, 256);
            }
            else
                if (type === 'sun') {
                    ctx.clearRect(0, 0, 256, 256);

                    // --- CORE (WHITE HOT CENTER) ---
                    const core = ctx.createRadialGradient(center, center, 0, center, center, center * 0.4);
                    core.addColorStop(0, 'rgba(255,255,255,1)');
                    core.addColorStop(0.3, 'rgba(255,240,180,1)');
                    core.addColorStop(1, 'rgba(255,200,80,0)');
                    ctx.fillStyle = core;
                    ctx.fillRect(0, 0, 256, 256);

                    // --- OUTER GLOW (STRONG ORANGE/RED HALO) ---
                    const glow = ctx.createRadialGradient(center, center, center * 0.2, center, center, center);
                    glow.addColorStop(0, 'rgba(255,200,120,0.6)');
                    glow.addColorStop(0.5, 'rgba(255,120,40,0.4)');
                    glow.addColorStop(1, 'rgba(255,80,0,0)');
                    ctx.fillStyle = glow;
                    ctx.fillRect(0, 0, 256, 256);

                    // --- SUBTLE SURFACE VARIATION (VERY LOW NOISE) ---
                    for (let i = 0; i < 20; i++) {
                        const x = Math.random() * 256;
                        const y = Math.random() * 256;
                        const r = Math.random() * 20 + 10;

                        const flare = ctx.createRadialGradient(x, y, 0, x, y, r);
                        flare.addColorStop(0, 'rgba(255,255,200,0.15)');
                        flare.addColorStop(1, 'rgba(255,150,50,0)');
                        ctx.fillStyle = flare;
                        ctx.fillRect(0, 0, 256, 256);
                    }
                }

            return new THREE.CanvasTexture(canvas);
        }

        // ==========================================
        // --- 2. ENVIRONMENT MANAGER ---
        // ==========================================
        class EnvironmentManager {
            constructor(scene) {
                this.scene = scene;
                this.birds = [];
                this.clouds = [];
                this.lightning = null;
                this.init();
            }

            init() {
                // Professional Sky Shader
                this.sky = new Sky();
                this.sky.scale.setScalar(450000);
                this.scene.add(this.sky);

                this.sky.material.uniforms['turbidity'].value = 10;
                this.sky.material.uniforms['rayleigh'].value = 3;
                this.sky.material.uniforms['mieCoefficient'].value = 0.005;
                this.sky.material.uniforms['mieDirectionalG'].value = 0.7;

                // Water
                this.water = new Water(new THREE.PlaneGeometry(1000, 1000), {
                    textureWidth: 512, textureHeight: 512,
                    waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', t => t.wrapS = t.wrapT = THREE.RepeatWrapping),
                    sunDirection: new THREE.Vector3(), sunColor: 0xffffff, waterColor: 0x001e3f, distortionScale: 3.7
                });
                this.water.rotation.x = -Math.PI / 2;
                this.water.position.y = -6.0;
                this.water.position.z = -500;
                this.scene.add(this.water);

                // Sand
                this.sand = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshStandardMaterial({ color: 0xe3c18d, roughness: 1.0 }));
                this.sand.rotation.x = -Math.PI / 2;
                this.sand.position.y = -6.1;
                this.sand.position.z = 50;
                this.scene.add(this.sand);

                // --- CLOUD CLUSTERS (For 3D Fluffy Look) ---
                const cloudTex = createSkyTexture('cloud');
                const cloudColors = [0xffffff, 0xdeeefb, 0xe0e0e0]; // White, Soft Blue, Soft Gray

                for (let i = 0; i < 10; i++) { // 10 Main Clusters
                    const clusterX = (Math.random() - 0.5) * 600;
                    const clusterY = 50 + Math.random() * 30;
                    const clusterZ = -100 - Math.random() * 300;

                    for (let j = 0; j < 8; j++) { // 8 Puffs per cluster
                        const mat = new THREE.SpriteMaterial({
                            map: cloudTex,
                            transparent: true,
                            opacity: 0.5,
                            color: cloudColors[Math.floor(Math.random() * cloudColors.length)]
                        });
                        const sprite = new THREE.Sprite(mat);
                        sprite.position.set(
                            clusterX + (Math.random() - 0.5) * 40,
                            clusterY + (Math.random() - 0.5) * 20,
                            clusterZ + (Math.random() - 0.5) * 20
                        );
                        sprite.scale.set(40 + Math.random() * 50, 25 + Math.random() * 30, 1);
                        this.scene.add(sprite);
                        this.clouds.push(sprite);
                    }
                }

                // Sun & Moon (CRITICAL FIXES)
                this.sunSprite = new THREE.Sprite(new THREE.SpriteMaterial({
                    map: createSkyTexture('sun'),
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                }));
                this.sunSprite.scale.set(100, 100, 1);
                this.sunSprite.renderOrder = 999;
                this.scene.add(this.sunSprite);

                this.moonSprite = new THREE.Sprite(new THREE.SpriteMaterial({
                    map: createSkyTexture('moon'),
                    transparent: true,
                    opacity: 0,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                }));
                this.moonSprite.scale.set(80, 80, 1);
                this.moonSprite.renderOrder = 998;
                this.scene.add(this.moonSprite);

                this.sunLight = new THREE.DirectionalLight(0xffffff, 1);
                this.scene.add(this.sunLight);

                // Stars
                const starGeo = new THREE.BufferGeometry();
                const starCoords = [];
                for (let i = 0; i < 3000; i++) starCoords.push((Math.random() - 0.5) * 800, Math.random() * 400, -400);
                starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
                this.starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0 });
                this.scene.add(new THREE.Points(starGeo, this.starsMat));

                for (let i = 0; i < 12; i++) this.birds.push(new Bird(this.scene));
            }

            createLightning() {
                const points = []; let start = new THREE.Vector3((Math.random() - 0.5) * 200, 100, -200);
                for (let i = 0; i < 12; i++) { points.push(start.clone()); start.add(new THREE.Vector3((Math.random() - 0.5) * 30, -15, (Math.random() - 0.5) * 10)); }
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const l = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 3 }));
                this.scene.add(l); setTimeout(() => this.scene.remove(l), 80);
            }

            update(time, current, target, lerp) {
                const uniforms = this.sky.material.uniforms;
                uniforms['turbidity'].value = THREE.MathUtils.lerp(current.turbidity || 10, target.turbidity || 10, lerp);
                uniforms['rayleigh'].value = THREE.MathUtils.lerp(current.rayleigh || 3, target.rayleigh || 3, lerp);
                // --- NATURAL LINEAR ORBIT ---
                const orbitSpeed = 2; // Degrees per second
                const azimuth = (160 + time * orbitSpeed) % 360;
                const elevationBase = THREE.MathUtils.lerp(current.elevation, target.elevation, lerp);
                const elevation = elevationBase + Math.sin(time * 0.1) * 2; // Tiny vertical sway for life

                const sun = new THREE.Vector3();
                const phi = THREE.MathUtils.degToRad(90 - elevation);
                const theta = THREE.MathUtils.degToRad(azimuth);
                sun.setFromSphericalCoords(1, phi, theta);
                uniforms['sunPosition'].value.copy(sun);

                // --- CELESTIAL VISIBILITY LOGIC ---
                const isNightTheme = target.name === 'Night';
                const isStormTheme = target.name === 'Storm';

                // Sun visibility
                const sunVisible = elevation > -5 && !isNightTheme;
                this.sunSprite.visible = sunVisible;
                this.sunSprite.material.opacity = sunVisible ? (isStormTheme ? 0.3 : 1) : 0;

                // Moon visibility
                this.moonSprite.visible = isNightTheme;
                this.moonSprite.material.opacity = isNightTheme ? 1 : 0;

                this.starsMat.opacity = THREE.MathUtils.lerp(current.stars, target.stars, lerp);

                // --- POSITIONING ---
                const sunOrbitPos = sun.clone().multiplyScalar(400); sunOrbitPos.z = -300;
                this.sunSprite.position.copy(sunOrbitPos);
                this.sunLight.position.copy(sunOrbitPos);

                // Moon: Follows a similar path at Night but at its own apex
                const moonPos = new THREE.Vector3();
                const moonElevation = isNightTheme ? 30 : -40;
                const moonPhi = THREE.MathUtils.degToRad(90 - moonElevation);
                moonPos.setFromSphericalCoords(400, moonPhi, THREE.MathUtils.degToRad(azimuth + 180)); // Moon is opposite to sun
                moonPos.z = -300;
                this.moonSprite.position.copy(moonPos);


                this.sunLight.intensity = THREE.MathUtils.lerp(current.light, target.light, lerp);

                this.clouds.forEach(c => {
                    c.position.x += 0.05; if (c.position.x > 400) c.position.x = -400;
                    c.material.opacity = (target.name === 'Storm') ? 0.8 : 0.4;
                });

                this.water.material.uniforms['time'].value += 1.0 / 60.0;
                this.water.material.uniforms['sunDirection'].value.copy(sun).normalize();
                this.birds.forEach(b => b.update(time));
                if (target.name === 'Storm' && Math.random() > 0.985) { this.createLightning(); this.sunLight.intensity = 5; }
                const sunColor = new THREE.Color().lerpColors(
                    new THREE.Color(current.sun),
                    new THREE.Color(target.sun),
                    lerp
                );

                // apply to directional light
                this.sunLight.color.copy(sunColor);

                // apply to water reflections
            }
        }

        // ==========================================
        // --- FISH UTILITIES ---
        // ==========================================
        function createStylizedFish(color) {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhysicalMaterial({ 
                color: color, 
                metalness: 0.1, 
                roughness: 0.2,
                emissive: color,
                emissiveIntensity: 0.3
            });
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const irisMat = new THREE.MeshBasicMaterial({ color: 0x000000 });

            // Head (Streamlined)
            const headGeo = new THREE.DodecahedronGeometry(1.0, 1);
            const fishHead = new THREE.Mesh(headGeo, mat);
            fishHead.scale.set(1.2, 1.0, 0.5);
            fishHead.position.x = 2.0;
            group.add(fishHead);

            // Eyes
            const eyeGeo = new THREE.SphereGeometry(0.25, 16, 16);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(2.2, 0.4, 0.4);
            const irisR = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), irisMat);
            irisR.position.z = 0.15; eyeR.add(irisR);
            group.add(eyeR);

            const eyeL = eyeR.clone();
            eyeL.position.z = -0.4;
            group.add(eyeL);

            // Body (Longer)
            const points = [];
            for (let i = 0; i < 8; i++) {
                points.push(new THREE.Vector2(Math.sin(i * 0.4) * 1.2, i * 1.0));
            }
            const bodyGeo = new THREE.LatheGeometry(points, 16);
            const fishBody = new THREE.Mesh(bodyGeo, mat);
            fishBody.rotation.z = Math.PI / 2;
            fishBody.position.x = 1.8;
            fishBody.scale.set(1.4, 1.0, 0.5);
            group.add(fishBody);

            // Tail Fins (Proportional)
            const tailGeo = new THREE.CylinderGeometry(0, 1.2, 2.5, 3, 1, true);
            const tailTop = new THREE.Mesh(tailGeo, mat);
            tailTop.position.set(-2.2, 0.8, 0);
            tailTop.rotation.z = 0.5;
            tailTop.scale.set(1.2, 1, 0.1);
            group.add(tailTop);

            const tailBottom = tailTop.clone();
            tailBottom.position.y = -0.8;
            tailBottom.rotation.z = Math.PI - 0.5;
            group.add(tailBottom);

            group.scale.set(0.6, 0.6, 0.6); // Balanced scale
            return group;
        }

        // Shared Geometries for Optimization
        const bonusSphereGeo = new THREE.SphereGeometry(1.2, 24, 24);
        const particleGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);

        class Bird {
            constructor(scene) {
                this.group = new THREE.Group();
                const wing = new THREE.PlaneGeometry(0.8, 0.2);
                const mat = new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide });
                this.l = new THREE.Mesh(wing, mat); this.r = new THREE.Mesh(wing, mat);
                this.l.position.x = -0.4; this.r.position.x = 0.4;
                this.group.add(this.l, this.r);
                this.reset();
                scene.add(this.group);
            }
            reset() {
                this.group.position.set(-100 - Math.random() * 50, 20 + Math.random() * 20, -50 - Math.random() * 100);
                this.speed = 0.2 + Math.random() * 0.2;
            }
            update(t) {
                this.group.position.x += this.speed;
                const flap = Math.sin(t * 8 + this.group.position.x) * 0.8;
                this.l.rotation.z = flap; this.r.rotation.z = -flap;
                if (this.group.position.x > 150) this.reset();
            }
        }

        // ==========================================
        // --- 3. SHOOTER & TARGET MODULE ---
        // ==========================================
        class ShooterManager {
            constructor(scene, camera) {
                this.scene = scene; this.camera = camera;
                this.bullets = []; this.recoil = 0; this.flash = 0;
                this.gun = this.createGun();
            }
            createGun() {
                const g = new THREE.Group();
                const metal = new THREE.MeshPhysicalMaterial({ color: 0x1a1a1a, metalness: 0.9, roughness: 0.3, clearcoat: 0.2 });
                const grip = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.8 });

                const body = new THREE.Mesh(new RoundedBoxGeometry(0.7, 1.0, 2.0, 2, 0.1), metal);
                const slide = new THREE.Mesh(new RoundedBoxGeometry(0.72, 0.4, 2.05, 3, 0.05), metal);
                slide.position.y = 0.4;
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 3.8, 32), metal);
                barrel.rotation.x = Math.PI / 2; barrel.position.z = -2.2;

                const handle = new THREE.Mesh(new RoundedBoxGeometry(0.5, 1.5, 0.8, 4, 0.1), grip);
                handle.position.set(0, -1.0, 0.4); handle.rotation.x = -Math.PI / 10;

                this.muzzle = new THREE.Mesh(new THREE.SphereGeometry(0.6), new THREE.MeshBasicMaterial({ color: 0xffdd44, transparent: true, opacity: 0 }));
                this.muzzle.position.z = -4.2;
                this.light = new THREE.PointLight(0xffaa00, 0, 30); this.light.position.z = -4.5;

                g.add(body, slide, barrel, handle, this.muzzle, this.light);
                this.scene.add(g); return g;
            }
            shoot(mouse, sound) {
                this.recoil = 0.4; this.flash = 5;
                if (sound.isPlaying) sound.stop(); sound.play();
                const vec = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(this.camera);
                const dir = vec.sub(this.camera.position).normalize();
                const tip = new THREE.Vector3(0, 0, -4).applyMatrix4(this.gun.matrixWorld);
                this.bullets.push(new Bullet(this.scene, tip, this.camera.position.clone().add(dir.multiplyScalar(50))));
            }
            update(mouse) {
                if (this.flash > 0) { this.muzzle.material.opacity = Math.random() * 0.5 + 0.5; this.light.intensity = 25; this.flash--; }
                else { this.muzzle.material.opacity = 0; this.light.intensity = 0; }

                const vec = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(this.camera);
                const pos = this.camera.position.clone().add(vec.sub(this.camera.position).normalize().multiplyScalar(-this.camera.position.z / vec.z));
                this.gun.position.copy(this.camera.position).add(new THREE.Vector3(0, -1.2, -2.5));
                this.gun.lookAt(pos);

                if (this.recoil > 0) { this.gun.position.z += this.recoil; this.gun.rotation.x -= this.recoil * 0.3; this.recoil *= 0.82; }
                for (let i = this.bullets.length - 1; i >= 0; i--) if (!this.bullets[i].update(this.scene)) this.bullets.splice(i, 1);
            }
        }

        class Bullet {
            constructor(scene, start, target) {
                this.mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.8), new THREE.MeshBasicMaterial({ color: 0xffaa00 }));
                this.mesh.position.copy(start); this.mesh.lookAt(target); this.mesh.rotateX(Math.PI / 2);
                this.dir = target.clone().sub(start).normalize(); this.life = 100;
                scene.add(this.mesh);
            }
            update(scene) {
                this.mesh.position.add(this.dir.clone().multiplyScalar(1.6));
                if (--this.life <= 0) { scene.remove(this.mesh); return false; } return true;
            }
        }

        class BonusObject {
            constructor(scene, type, camera) {
                this.type = type;
                const geometry = type === 'heart' ? this.createHeartGeo() : bonusSphereGeo;
                const material = new THREE.MeshPhysicalMaterial({
                    color: type === 'heart' ? 0xff4757 : 0xffd700,
                    emissive: type === 'heart' ? 0xff4757 : 0xffd700,
                    emissiveIntensity: 0.5,
                    metalness: 0.5, roughness: 0.2
                });
                this.mesh = new THREE.Mesh(geometry, material);
                scene.add(this.mesh);
                this.reset(camera);
            }
            createHeartGeo() {
                if (window.heartGeo) return window.heartGeo;
                const shape = new THREE.Shape();
                shape.moveTo(0, 0);
                shape.bezierCurveTo(0, -1, -2, -1, -2, 1);
                shape.bezierCurveTo(-2, 3, 0, 4, 0, 6);
                shape.bezierCurveTo(0, 4, 2, 3, 2, 1);
                shape.bezierCurveTo(2, -1, 0, -1, 0, 0);
                const ext = { depth: 0.8, bevelEnabled: true, bevelSegments: 2, steps: 2, bevelSize: 0.4, bevelThickness: 0.4 };
                window.heartGeo = new THREE.ExtrudeGeometry(shape, ext);
                window.heartGeo.rotateX(Math.PI); window.heartGeo.scale(0.4, 0.4, 0.4);
                return window.heartGeo;
            }
            reset(camera) {
                const fh = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov) / 2) * camera.position.z;
                const side = Math.random() > 0.5 ? 1 : -1;
                this.mesh.position.set(side * (fh * camera.aspect / 2 + 5), -fh / 2 - 5, -8);
                this.vel = new THREE.Vector3(-side * 0.2, Math.sqrt(2 * 0.005 * fh * 0.7), 0);
                this.mesh.visible = true;
            }
            update(dt) {
                if (!this.mesh.visible) return;
                // Scaled physics for dt (multiplying by 60 to maintain current speed)
                const step = dt * 60;
                this.vel.y -= 0.005 * step; 
                this.mesh.position.x += this.vel.x * step;
                this.mesh.position.y += this.vel.y * step;
                this.mesh.rotation.y += 0.05 * step;
                if (this.mesh.position.y < -15) this.mesh.visible = false;
            }
        }

        class ProjectileFish {
            constructor(scene, index, camera) {
                const COLORS = [0x23a4b0, 0xb63ee6, 0xe67e22];
                this.color = COLORS[index % COLORS.length];
                this.isCorrect = false;
                this.value = "";

                // Build the Stylized Fish Group
                this.mesh = createStylizedFish(this.color);

                // --- ADVANCED 3D BUBBLE ---
                const bubbleGeo = new THREE.SphereGeometry(1.2, 32, 32);
                this.bubbleMat = new THREE.MeshPhysicalMaterial({
                    color: this.color, // Tint with fish color
                    metalness: 0,
                    roughness: 0,
                    transmission: 0.95,
                    thickness: 0.5,
                    iridescence: 1.0,
                    iridescenceIOR: 1.3,
                    clearcoat: 1.0,
                    transparent: true,
                    opacity: 0.5
                });

                // Add distortion wobble via shader
                this.bubbleMat.onBeforeCompile = (shader) => {
                    shader.uniforms.time = { value: 0 };
                    this.bubbleMat.userData.shader = shader;
                    shader.vertexShader = `
                        uniform float time;
                        ${shader.vertexShader}
                    `.replace(`#include <begin_vertex>`, `
                        #include <begin_vertex>
                        float distortion = sin(position.y * 5.0 + time * 3.0) * 0.05;
                        transformed += normal * distortion;
                    `);
                };

                this.bubbleMesh = new THREE.Mesh(bubbleGeo, this.bubbleMat);
                this.bubbleMesh.position.y = 3.5;
                this.mesh.add(this.bubbleMesh);

                // Internal Answer Label
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 256;
                this.labelTex = new THREE.CanvasTexture(canvas);
                const labelMat = new THREE.SpriteMaterial({ map: this.labelTex, transparent: true });
                this.labelSprite = new THREE.Sprite(labelMat);
                this.labelSprite.scale.set(1.5, 1.5, 1);
                this.bubbleMesh.add(this.labelSprite);

                scene.add(this.mesh);
                this.baseX = 0;
                this.reset(camera, index);
            }

            setAnswer(val, correct) {
                this.value = val;
                this.isCorrect = correct;
                const ctx = this.labelTex.image.getContext('2d');
                ctx.clearRect(0, 0, 256, 256);
                
                // Pure High-Contrast Text
                ctx.fillStyle = 'black'; 
                ctx.font = 'bold 140px Inter, Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(val.toString(), 128, 128);
                this.labelTex.needsUpdate = true;
            }

            reset(camera, index, gravity = 0.008) {
                const fh = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov) / 2) * camera.position.z;
                const fw = fh * camera.aspect;
                const slots = [-fw * 0.4, 0, fw * 0.4];
                const xPos = slots[index % 3];
                
                // Spawn deep to ensure they emerge from water
                this.mesh.position.set(xPos, -fh / 2 - 8, -10);
                this.baseX = xPos;
                
                // Calibrated jump power (1.2 instead of 1.6) to keep them in frame
                this.vel = new THREE.Vector3(0, Math.sqrt(2 * gravity * fh * 1.2), 0);
                this.gravity = gravity;
                this.mesh.visible = true;
                this.hasBeenMissed = false;
            }

            update(camera, dt, time) {
                if (!this.mesh.visible) return;
                const step = dt * 60;
                
                // Physics
                this.vel.y -= this.gravity * step;
                this.mesh.position.y += this.vel.y * step;
                
                // Update bubble wobble time
                if (this.bubbleMat.userData.shader) {
                    this.bubbleMat.userData.shader.uniforms.time.value = time;
                }
                
                // Floating Bubble Wobble
                this.bubbleMesh.position.y = 3.5 + Math.sin(time * 4) * 0.3;
                this.bubbleMesh.rotation.z = Math.sin(time * 2) * 0.1;
                
                // Natural Leap Sway
                this.mesh.position.x = this.baseX + Math.sin(time * 2 + this.mesh.position.y * 0.1) * 0.4;
                
                // Organic tail wiggle (High frequency)
                const tail = this.mesh.children.find(c => c.type === "Mesh" && c.position.x < 0);
                if (tail) {
                    tail.rotation.y = Math.sin(time * 20) * 0.4;
                }
                
                // Natural Swimming Shake
                this.mesh.rotation.y = Math.PI / 2 + Math.sin(time * 15) * 0.1;
                
                // Nose-Dive Rotation (Face the trajectory)
                // We map velocity to rotation: Up on way up, Down on way down
                const targetRotZ = Math.max(-1.2, Math.min(1.2, this.vel.y * 0.8));
                this.mesh.rotation.z = THREE.MathUtils.lerp(this.mesh.rotation.z, targetRotZ, 0.1 * step);

                if (this.mesh.position.y < -25 && !this.hasBeenMissed) {
                    this.hasBeenMissed = true;
                    return true;
                }
                return false;
            }
        }

        // ==========================================
        // --- 4. MAIN GAME ENGINE ---
        // ==========================================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87ceeb, 0.005);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 2, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const env = new EnvironmentManager(scene);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8)); // Add Ambient Light for fish visibility
        const shooter = new ShooterManager(scene, camera);
        const math = new MathManager();
        const cubes = Array.from({ length: 3 }, (_, i) => new ProjectileFish(scene, i, camera));
        const bonusObjects = [];
        const clock = new THREE.Clock();

        // Game State
        const state = {
            score: 0, lives: 3, level: 1, questionCount: 0,
            isGameOver: false, isBonus: false,
            gravity: 0.008
        };

        function updateHUD() {
            document.getElementById('score-label').innerText = `SCORE: ${state.score}`;
            document.getElementById('level-label').innerText = `LEVEL: ${state.level}`;
            const container = document.getElementById('lives-container');
            container.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = `<svg class="heart ${i >= state.lives ? 'empty' : ''}" viewBox="0 0 32 32"><path d="M16 28.5L14.1 26.8C7.3 20.6 3 16.7 3 11.9 3 8 6 5 9.9 5c2.2 0 4.3 1 5.7 2.7C17 6 19.1 5 21.3 5 25.2 5 28.2 8 28.2 11.9c0 4.8-4.3 8.7-11.1 14.9L16 28.5z"/></svg>`;
                container.appendChild(heart);
            }
        }

        function clearCubes() {
            cubes.forEach(c => c.mesh.visible = false);
        }

        function startBonusRound() {
            state.isBonus = true;
            state.isTransitioning = true;
            document.getElementById('question-text').innerText = "BONUS ROUND!";
            clearCubes();

            let count = 0;
            const interval = setInterval(() => {
                if (state.isGameOver) { clearInterval(interval); return; }
                const type = Math.random() > 0.4 ? 'sphere' : 'heart';
                bonusObjects.push(new BonusObject(scene, type, camera));
                count++;
                if (count >= 8) {
                    clearInterval(interval);
                    setTimeout(endBonusRound, 3000);
                }
            }, 800);
        }

        function endBonusRound() {
            state.isBonus = false;
            state.isTransitioning = false;
            bonusObjects.forEach(o => scene.remove(o.mesh));
            bonusObjects.length = 0;
            nextQuestion();
        }

        function nextQuestion() {
            if (state.lives <= 0 || state.isGameOver) return;
            state.isTransitioning = false;
            state.questionCount++;

            if (state.questionCount > 1 && state.questionCount % 15 === 0) {
                startBonusRound();
                return;
            }

            if (state.questionCount % 5 === 0) {
                state.level = Math.min(10, state.level + 1);
                // Corrected Gravity Logic: Start at 0.008, decrease slowly, min 0.005
                state.gravity = Math.max(0.005, 0.008 - (state.level * 0.0003));
            }

            const q = math.generate(state.level);
            document.getElementById('question-text').innerText = q.question;
            const opts = math.getOptions(q.answer);

            cubes.forEach((c, i) => {
                c.reset(camera, i, state.gravity);
                c.setAnswer(opts[i], opts[i] === q.answer);
            });
            updateHUD();
        }

        function triggerNextWithDelay() {
            if (state.isTransitioning || state.isGameOver) return;
            state.isTransitioning = true;
            clearCubes();
            setTimeout(nextQuestion, 1200);
        }

        // Audio
        const listener = new THREE.AudioListener(); camera.add(listener);
        const shootSound = new THREE.Audio(listener); const correctSound = new THREE.Audio(listener); const wrongSound = new THREE.Audio(listener);
        const audioLoader = new THREE.AudioLoader();
        audioLoader.load(SOUND_EFFECTS.shot, b => shootSound.setBuffer(b));
        audioLoader.load(SOUND_EFFECTS.correct, b => correctSound.setBuffer(b));
        audioLoader.load(SOUND_EFFECTS.wrong, b => wrongSound.setBuffer(b));

        // Interaction
        const mouse = new THREE.Vector2();
        window.addEventListener('mousemove', e => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            document.getElementById('crosshair').style.left = e.clientX + 'px';
            document.getElementById('crosshair').style.top = e.clientY + 'px';
        });
        window.addEventListener('mousedown', () => {
            if (state.isGameOver) location.reload();
            else shooter.shoot(mouse, shootSound);
        });

        // Theme Cycle
        let currentTheme = THEMES.DAY, targetTheme = THEMES.DAY, themeLerp = 0;
        function cycleTheme() {
            const arr = Object.values(THEMES);
            targetTheme = arr[(arr.indexOf(targetTheme) + 1) % arr.length]; themeLerp = 0;
        }
        setInterval(cycleTheme, 60000);

        const particles = [];
        const _tempColor = new THREE.Color();
        function createBlast(pos, color) {
            _tempColor.set(color);
            for (let i = 0; i < 15; i++) {
                const p = new THREE.Mesh(particleGeo, new THREE.MeshStandardMaterial({ 
                    color: _tempColor, 
                    emissive: _tempColor, 
                    emissiveIntensity: 0.5 
                }));
                p.position.copy(pos); 
                p.vel = new THREE.Vector3((Math.random() - 0.5) * 0.8, (Math.random() - 0.5) * 0.8, (Math.random() - 0.5) * 0.8);
                p.life = 1.0; scene.add(p); particles.push(p);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (state.isGameOver) return;

            const dt = clock.getDelta();
            const time = Date.now() * 0.001;
            
            if (themeLerp < 1) {
                themeLerp += 0.003;
                env.update(time, currentTheme, targetTheme, themeLerp);
                if (themeLerp >= 1) currentTheme = targetTheme;
            } else env.update(time, currentTheme, targetTheme, 1);

            shooter.update(mouse);

            // Collision & Miss Check
            shooter.bullets.forEach(b => {
                if (!state.isBonus) {
                    cubes.forEach(c => {
                        if (c.mesh.visible && b.mesh.position.distanceTo(c.mesh.position) < 2.5) {
                            createBlast(c.mesh.position, c.color);
                            c.mesh.visible = false; b.life = 0;
                            if (c.isCorrect) {
                                state.score += 100 * state.level;
                                correctSound.play();
                                triggerNextWithDelay();
                            } else {
                                state.lives--;
                                wrongSound.play();
                                updateHUD();
                                if (state.lives <= 0) gameOver();
                            }
                        }
                    });
                } else {
                    bonusObjects.forEach(o => {
                        if (o.mesh.visible && b.mesh.position.distanceTo(o.mesh.position) < 2.0) {
                            createBlast(o.mesh.position, o.type === 'heart' ? 0xff4757 : 0xffd700);
                            o.mesh.visible = false; b.life = 0;
                            if (o.type === 'heart') {
                                state.lives = Math.min(6, state.lives + 1);
                                correctSound.play();
                            } else {
                                state.score += 500;
                                correctSound.play();
                            }
                            updateHUD();
                        }
                    });
                }
            });

            if (!state.isBonus) {
                cubes.forEach(c => {
                    if (c.update(camera, dt, time)) { // Missed!
                        if (c.isCorrect) {
                            state.lives--;
                            wrongSound.play();
                            updateHUD();
                            if (state.lives <= 0) gameOver();
                            else triggerNextWithDelay();
                        }
                    }
                });
            } else {
                bonusObjects.forEach(o => o.update(dt));
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.position.add(p.vel.clone().multiplyScalar(dt * 60)); 
                p.life -= 0.02 * dt * 60;
                p.scale.setScalar(Math.max(0.01, p.life));
                if (p.life <= 0) { 
                    scene.remove(p); 
                    p.geometry.dispose();
                    p.material.dispose();
                    particles.splice(i, 1); 
                }
            }

            renderer.render(scene, camera);
        }

        function gameOver() {
            state.isGameOver = true;
            document.getElementById('question-text').innerHTML = `GAME OVER<br><span style="font-size:1.5rem">FINAL SCORE: ${state.score}<br>CLICK TO RESTART</span>`;
        }

        updateHUD();
        nextQuestion();
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
