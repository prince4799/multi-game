<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Beach Shooter | OGL 3D Arcade</title>
    <meta name="description" content="A premium 3D math training game built with OGL. Shoot targets to solve equations in a beautiful beach setting.">
    <link rel="stylesheet" href="style.css">
    <!-- Load OGL UMD build -->
    <script src="https://cdn.jsdelivr.net/npm/ogl/dist/ogl.umd.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <div class="hud-card">
            <span class="label">Score</span>
            <span id="score" class="value">0</span>
        </div>
        <div class="hud-card">
            <span class="label">Time</span>
            <span id="timer" class="value">60</span>
        </div>
    </div>

    <div id="math-display">
        <div id="equation">Ready?</div>
    </div>

    <div id="overlay">
        <div class="menu-card">
            <h1 id="status-text">Beach Shooter</h1>
            <p>Solve math problems by shooting the correct targets. Master the beach and sharpen your mind!</p>
            
            <button id="start-btn">Start Training</button>

            <div class="controls-hint">
                <div class="control-item">
                    <span class="key">Touch/Mouse</span>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
