<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Beach Shooter - 3D</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        #canvas-container { width: 100%; height: 100vh; cursor: none; }
        .crosshair {
            position: fixed; top: 50%; left: 50%; width: 30px; height: 30px;
            border: 2px solid rgba(255, 255, 255, 0.8); border-radius: 50%;
            pointer-events: none; transform: translate(-50%, -50%); z-index: 100;
            mix-blend-mode: difference;
        }
        .crosshair::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
            background: #fff; border-radius: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="crosshair" id="crosshair"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { Water } from 'three/examples/jsm/objects/Water.js';
        import { Sky } from 'three/examples/jsm/objects/Sky.js';
        import { RoundedBoxGeometry } from 'three/examples/jsm/geometries/RoundedBoxGeometry.js';

        // --- 1. ENVIRONMENT CONFIG ---
        const THEMES = {
            DAY: { sky: 0x87ceeb, light: 1.2, amb: 0.5, sun: 0xffcc33, stars: 0, water: 0x0077be, sand: 0xe3c18d, name: 'Day', turbidity: 6, rayleigh: 1.2, elevation: 25, sound: 'https://cdn.freesound.org/previews/337/337435_5831968-lq.mp3' },
            NIGHT: { sky: 0x050510, light: 0.1, amb: 0.1, sun: 0xddddff, stars: 1, water: 0x001e3c, sand: 0x2c1e14, name: 'Night', turbidity: 20, rayleigh: 0.1, elevation: -70, sound: 'https://cdn.freesound.org/previews/337/337435_5831968-lq.mp3' },
            STORM: { sky: 0x1a252f, light: 0.3, amb: 0.2, sun: 0x444444, stars: 0, water: 0x141a1f, sand: 0x3e2c1c, name: 'Storm', turbidity: 50, rayleigh: 0.5, elevation: 30, sound: 'https://cdn.freesound.org/previews/347/347492_321967-lq.mp3' },
            DAWN: { sky: 0xff7e5f, light: 0.8, amb: 0.4, sun: 0xffaa00, stars: 0, water: 0x1e3c5a, sand: 0x5d4037, name: 'Dawn', turbidity: 10, rayleigh: 4, elevation: 5, sound: 'https://cdn.freesound.org/previews/322/322616_5553535-lq.mp3' }
        };

        const SOUND_EFFECTS = {
            shot: 'https://cdn.freesound.org/previews/174/174436_3242048-lq.mp3',
            thunder: 'https://cdn.freesound.org/previews/347/347492_321967-lq.mp3'
        };

        // --- 1.5 TEXTURE GENERATORS ---
        function createSkyTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            const center = 128;
            /*if (type === 'cloud') {
                const grad = ctx.createRadialGradient(center, center, 0, center, center, center);
                grad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                grad.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)');
                grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                ctx.fillStyle = grad; ctx.fillRect(0, 0, 256, 256);
            }  */if (type === 'cloud') {
    const imageData = ctx.createImageData(256, 256);
    const data = imageData.data;

    // simple pseudo-noise (no external lib)
    function noise(x, y) {
        return Math.sin(x * 0.05) * Math.sin(y * 0.05);
    }

    for (let y = 0; y < 256; y++) {
        for (let x = 0; x < 256; x++) {
            const i = (y * 256 + x) * 4;

            // distance from center (for soft falloff)
            const dx = x - center;
            const dy = y - center;
            const dist = Math.sqrt(dx * dx + dy * dy) / center;

            // layered noise
            const n =
                noise(x, y) * 0.5 +
                noise(x * 2, y * 2) * 0.25 +
                noise(x * 4, y * 4) * 0.125;

            // combine falloff + noise
            let alpha = (1 - dist) * (0.6 + n);

            // clamp
            alpha = Math.max(0, Math.min(1, alpha));

            data[i] = 255;     // R
            data[i + 1] = 255; // G
            data[i + 2] = 255; // B
            data[i + 3] = alpha * 255;
        }
    }

    ctx.putImageData(imageData, 0, 0);

    // keep your existing soft gradient (important)
    const grad = ctx.createRadialGradient(center, center, 0, center, center, center);
    grad.addColorStop(0, 'rgba(255,255,255,0.6)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 256, 256);
}
            else if (type === 'moon') {
    const imageData = ctx.createImageData(256, 256);
    const data = imageData.data;

    function noise(x, y) {
        return Math.sin(x * 0.08) * Math.sin(y * 0.08);
    }

    for (let y = 0; y < 256; y++) {
        for (let x = 0; x < 256; x++) {
            const i = (y * 256 + x) * 4;

            const dx = x - center;
            const dy = y - center;
            const dist = Math.sqrt(dx * dx + dy * dy) / center;

            if (dist > 1) {
                data[i + 3] = 0;
                continue;
            }

            // base moon color
            let shade = 180;

            // surface noise (craters / roughness)
            const n =
                noise(x, y) * 0.5 +
                noise(x * 2, y * 2) * 0.25 +
                noise(x * 4, y * 4) * 0.125;

            shade += n * 40;

            // lighting (phase: light from right side)
            const lightDir = 0.6; // shift for crescent/full control
            const lighting = (dx / center + lightDir);
            shade *= Math.max(0.2, lighting);

            // clamp
            shade = Math.max(120, Math.min(230, shade));

            data[i] = shade;         // R
            data[i + 1] = shade + 5; // G (slight cool tint)
            data[i + 2] = shade + 20;// B (bluish night tone)
            data[i + 3] = 255;       // alpha
        }
    }

    ctx.putImageData(imageData, 0, 0);

    // subtle crater spots (large features)
    for (let i = 0; i < 8; i++) {
        const cx = center + (Math.random() - 0.5) * 120;
        const cy = center + (Math.random() - 0.5) * 120;
        const r = Math.random() * 15 + 5;

        const craterGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        craterGrad.addColorStop(0, 'rgba(120,120,120,0.4)');
        craterGrad.addColorStop(1, 'transparent');

        ctx.fillStyle = craterGrad;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
    }

    // KEEP your glow (important for beach night feel)
    const grad = ctx.createRadialGradient(center, center, 0, center, center, center);
    grad.addColorStop(0, 'rgba(200,210,255,0.4)');
    grad.addColorStop(0.7, 'rgba(150,160,200,0.2)');
    grad.addColorStop(1, 'transparent');

    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 256, 256);
}
            else 
             if (type === 'sun') {
    ctx.clearRect(0, 0, 256, 256);

    // --- CORE (WHITE HOT CENTER) ---
    const core = ctx.createRadialGradient(center, center, 0, center, center, center * 0.4);
    core.addColorStop(0, 'rgba(255,255,255,1)');
    core.addColorStop(0.3, 'rgba(255,240,180,1)');
    core.addColorStop(1, 'rgba(255,200,80,0)');
    ctx.fillStyle = core;
    ctx.fillRect(0, 0, 256, 256);

    // --- OUTER GLOW (STRONG ORANGE/RED HALO) ---
    const glow = ctx.createRadialGradient(center, center, center * 0.2, center, center, center);
    glow.addColorStop(0, 'rgba(255,200,120,0.6)');
    glow.addColorStop(0.5, 'rgba(255,120,40,0.4)');
    glow.addColorStop(1, 'rgba(255,80,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, 256, 256);

    // --- SUBTLE SURFACE VARIATION (VERY LOW NOISE) ---
    for (let i = 0; i < 20; i++) {
        const x = Math.random() * 256;
        const y = Math.random() * 256;
        const r = Math.random() * 20 + 10;

        const flare = ctx.createRadialGradient(x, y, 0, x, y, r);
        flare.addColorStop(0, 'rgba(255,255,200,0.15)');
        flare.addColorStop(1, 'rgba(255,150,50,0)');
        ctx.fillStyle = flare;
        ctx.fillRect(0, 0, 256, 256);
    }
}

            return new THREE.CanvasTexture(canvas);
        }

        // ==========================================
        // --- 2. ENVIRONMENT MANAGER ---
        // ==========================================
        class EnvironmentManager {
            constructor(scene) {
                this.scene = scene;
                this.birds = [];
                this.clouds = [];
                this.lightning = null;
                this.init();
            }

            init() {
                // Professional Sky Shader
                this.sky = new Sky();
                this.sky.scale.setScalar(450000);
                this.scene.add(this.sky);

                this.sky.material.uniforms['turbidity'].value = 10;
                this.sky.material.uniforms['rayleigh'].value = 3;
                this.sky.material.uniforms['mieCoefficient'].value = 0.005;
                this.sky.material.uniforms['mieDirectionalG'].value = 0.7;

                // Water
                this.water = new Water(new THREE.PlaneGeometry(1000, 1000), {
                    textureWidth: 512, textureHeight: 512,
                    waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', t => t.wrapS = t.wrapT = THREE.RepeatWrapping),
                    sunDirection: new THREE.Vector3(), sunColor: 0xffffff, waterColor: 0x001e3f, distortionScale: 3.7
                });
                this.water.rotation.x = -Math.PI / 2;
                this.water.position.y = -6.0;
                this.water.position.z = -500;
                this.scene.add(this.water);

                // Sand
                this.sand = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshStandardMaterial({ color: 0xe3c18d, roughness: 1.0 }));
                this.sand.rotation.x = -Math.PI / 2;
                this.sand.position.y = -6.1;
                this.sand.position.z = 50;
                this.scene.add(this.sand);

                // --- CLOUD CLUSTERS (For 3D Fluffy Look) ---
                const cloudTex = createSkyTexture('cloud');
                const cloudColors = [0xffffff, 0xdeeefb, 0xe0e0e0]; // White, Soft Blue, Soft Gray
                
                for(let i=0; i<10; i++) { // 10 Main Clusters
                    const clusterX = (Math.random()-0.5)*600;
                    const clusterY = 50 + Math.random()*30;
                    const clusterZ = -100 - Math.random()*300;
                    
                    for(let j=0; j<8; j++) { // 8 Puffs per cluster
                        const mat = new THREE.SpriteMaterial({ 
                            map: cloudTex, 
                            transparent: true, 
                            opacity: 0.5,
                            color: cloudColors[Math.floor(Math.random()*cloudColors.length)]
                        });
                        const sprite = new THREE.Sprite(mat);
                        sprite.position.set(
                            clusterX + (Math.random()-0.5)*40,
                            clusterY + (Math.random()-0.5)*20,
                            clusterZ + (Math.random()-0.5)*20
                        );
                        sprite.scale.set(40 + Math.random()*50, 25 + Math.random()*30, 1);
                        this.scene.add(sprite);
                        this.clouds.push(sprite);
                    }
                }

                // Sun & Moon (CRITICAL FIXES)
                this.sunSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
                    map: createSkyTexture('sun'), 
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                }));
                this.sunSprite.scale.set(100, 100, 1);
                this.sunSprite.renderOrder = 999;
                this.scene.add(this.sunSprite);

                this.moonSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
                    map: createSkyTexture('moon'), 
                    transparent: true, 
                    opacity: 0,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                }));
                this.moonSprite.scale.set(80, 80, 1);
                this.moonSprite.renderOrder = 998;
                this.scene.add(this.moonSprite);

                this.sunLight = new THREE.DirectionalLight(0xffffff, 1);
                this.scene.add(this.sunLight);

                // Stars
                const starGeo = new THREE.BufferGeometry();
                const starCoords = [];
                for(let i=0; i<3000; i++) starCoords.push((Math.random()-0.5)*800, Math.random()*400, -400);
                starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
                this.starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0 });
                this.scene.add(new THREE.Points(starGeo, this.starsMat));

                for(let i=0; i<12; i++) this.birds.push(new Bird(this.scene));
            }

            createLightning() {
                const points = []; let start = new THREE.Vector3((Math.random()-0.5)*200, 100, -200);
                for(let i=0; i<12; i++) { points.push(start.clone()); start.add(new THREE.Vector3((Math.random()-0.5)*30, -15, (Math.random()-0.5)*10)); }
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const l = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 3 }));
                this.scene.add(l); setTimeout(() => this.scene.remove(l), 80);
            }

            update(time, current, target, lerp) {
                const uniforms = this.sky.material.uniforms;
                uniforms['turbidity'].value = THREE.MathUtils.lerp(current.turbidity || 10, target.turbidity || 10, lerp);
                uniforms['rayleigh'].value = THREE.MathUtils.lerp(current.rayleigh || 3, target.rayleigh || 3, lerp);
                           // --- NATURAL LINEAR ORBIT ---
                const orbitSpeed = 2; // Degrees per second
                const azimuth = (160 + time * orbitSpeed) % 360; 
                const elevationBase = THREE.MathUtils.lerp(current.elevation, target.elevation, lerp);
                const elevation = elevationBase + Math.sin(time * 0.1) * 2; // Tiny vertical sway for life
                
                const sun = new THREE.Vector3();
                const phi = THREE.MathUtils.degToRad(90 - elevation);
                const theta = THREE.MathUtils.degToRad(azimuth);
                sun.setFromSphericalCoords(1, phi, theta);
                uniforms['sunPosition'].value.copy(sun);

                // --- CELESTIAL VISIBILITY LOGIC ---
                const isNightTheme = target.name === 'Night';
                const isStormTheme = target.name === 'Storm';
                
                // Sun visibility
                const sunVisible = elevation > -5 && !isNightTheme;
                this.sunSprite.visible = sunVisible;
                this.sunSprite.material.opacity = sunVisible ? (isStormTheme ? 0.3 : 1) : 0;

                // Moon visibility
                this.moonSprite.visible = isNightTheme;
                this.moonSprite.material.opacity = isNightTheme ? 1 : 0;

                this.starsMat.opacity = THREE.MathUtils.lerp(current.stars, target.stars, lerp);

                // --- POSITIONING ---
                const sunOrbitPos = sun.clone().multiplyScalar(400); sunOrbitPos.z = -300;
                this.sunSprite.position.copy(sunOrbitPos);
                this.sunLight.position.copy(sunOrbitPos);

                // Moon: Follows a similar path at Night but at its own apex
                const moonPos = new THREE.Vector3();
                const moonElevation = isNightTheme ? 30 : -40;
                const moonPhi = THREE.MathUtils.degToRad(90 - moonElevation);
                moonPos.setFromSphericalCoords(400, moonPhi, THREE.MathUtils.degToRad(azimuth + 180)); // Moon is opposite to sun
                moonPos.z = -300;
                this.moonSprite.position.copy(moonPos);


                this.sunLight.intensity = THREE.MathUtils.lerp(current.light, target.light, lerp);

                this.clouds.forEach(c => {
                    c.position.x += 0.05; if(c.position.x > 400) c.position.x = -400;
                    c.material.opacity = (target.name === 'Storm') ? 0.8 : 0.4;
                });

                this.water.material.uniforms['time'].value += 1.0/60.0;
                this.water.material.uniforms['sunDirection'].value.copy(sun).normalize();
                this.birds.forEach(b => b.update(time));
                if (target.name === 'Storm' && Math.random() > 0.985) { this.createLightning(); this.sunLight.intensity = 5; }
                const sunColor = new THREE.Color().lerpColors(
                    new THREE.Color(current.sun),
                    new THREE.Color(target.sun),
                    lerp
                );

                // apply to directional light
                this.sunLight.color.copy(sunColor);

                // apply to water reflections
                this.water.material.uniforms['sunColor'].value.copy(sunColor);
            }
        }

        class Bird {
            constructor(scene) {
                this.group = new THREE.Group();
                const wing = new THREE.PlaneGeometry(0.8, 0.2);
                const mat = new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide });
                this.l = new THREE.Mesh(wing, mat); this.r = new THREE.Mesh(wing, mat);
                this.l.position.x = -0.4; this.r.position.x = 0.4;
                this.group.add(this.l, this.r);
                this.reset();
                scene.add(this.group);
            }
            reset() { 
                this.group.position.set(-100 - Math.random()*50, 20 + Math.random()*20, -50 - Math.random()*100); 
                this.speed = 0.2 + Math.random()*0.2;
            }
            update(t) {
                this.group.position.x += this.speed;
                const flap = Math.sin(t * 8 + this.group.position.x) * 0.8;
                this.l.rotation.z = flap; this.r.rotation.z = -flap;
                if(this.group.position.x > 150) this.reset();
            }
        }

        // ==========================================
        // --- 3. SHOOTER & TARGET MODULE ---
        // ==========================================
        class ShooterManager {
            constructor(scene, camera) {
                this.scene = scene; this.camera = camera;
                this.bullets = []; this.recoil = 0; this.flash = 0;
                this.gun = this.createGun();
            }
            createGun() {
                const g = new THREE.Group();
                const metal = new THREE.MeshPhysicalMaterial({ color: 0x1a1a1a, metalness: 0.9, roughness: 0.3, clearcoat: 0.2 });
                const grip = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.8 });
                
                const body = new THREE.Mesh(new RoundedBoxGeometry(0.7, 1.0, 2.0, 2, 0.1), metal);
                const slide = new THREE.Mesh(new RoundedBoxGeometry(0.72, 0.4, 2.05, 3, 0.05), metal);
                slide.position.y = 0.4;
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 3.8, 32), metal);
                barrel.rotation.x = Math.PI/2; barrel.position.z = -2.2;
                
                const handle = new THREE.Mesh(new RoundedBoxGeometry(0.5, 1.5, 0.8, 4, 0.1), grip);
                handle.position.set(0, -1.0, 0.4); handle.rotation.x = -Math.PI/10;

                this.muzzle = new THREE.Mesh(new THREE.SphereGeometry(0.6), new THREE.MeshBasicMaterial({ color: 0xffdd44, transparent: true, opacity: 0 }));
                this.muzzle.position.z = -4.2;
                this.light = new THREE.PointLight(0xffaa00, 0, 30); this.light.position.z = -4.5;

                g.add(body, slide, barrel, handle, this.muzzle, this.light);
                this.scene.add(g); return g;
            }
            shoot(mouse, sound) {
                this.recoil = 0.4; this.flash = 5;
                if(sound.isPlaying) sound.stop(); sound.play();
                const vec = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(this.camera);
                const dir = vec.sub(this.camera.position).normalize();
                const tip = new THREE.Vector3(0,0,-4).applyMatrix4(this.gun.matrixWorld);
                this.bullets.push(new Bullet(this.scene, tip, this.camera.position.clone().add(dir.multiplyScalar(50))));
            }
            update(mouse) {
                if(this.flash > 0) { this.muzzle.material.opacity = Math.random()*0.5+0.5; this.light.intensity = 25; this.flash--; }
                else { this.muzzle.material.opacity = 0; this.light.intensity = 0; }

                const vec = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(this.camera);
                const pos = this.camera.position.clone().add(vec.sub(this.camera.position).normalize().multiplyScalar(-this.camera.position.z/vec.z));
                this.gun.position.copy(this.camera.position).add(new THREE.Vector3(0, -1.2, -2.5));
                this.gun.lookAt(pos);

                if(this.recoil > 0) { this.gun.position.z += this.recoil; this.gun.rotation.x -= this.recoil*0.3; this.recoil *= 0.82; }
                for(let i=this.bullets.length-1; i>=0; i--) if(!this.bullets[i].update(this.scene)) this.bullets.splice(i,1);
            }
        }

        class Bullet {
            constructor(scene, start, target) {
                this.mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.8), new THREE.MeshBasicMaterial({ color: 0xffaa00 }));
                this.mesh.position.copy(start); this.mesh.lookAt(target); this.mesh.rotateX(Math.PI/2);
                this.dir = target.clone().sub(start).normalize(); this.life = 100;
                scene.add(this.mesh);
            }
            update(scene) {
                this.mesh.position.add(this.dir.clone().multiplyScalar(1.6));
                if(--this.life <= 0) { scene.remove(this.mesh); return false; } return true;
            }
        }

        class ProjectileCube {
            constructor(scene, index, camera) {
                const COLORS = [0x23a4b0, 0xb63ee6, 0xe67e22];
                this.color = COLORS[index % COLORS.length];
                
                // Vibrant Glass Material
                const mat = new THREE.MeshPhysicalMaterial({ 
                    color: this.color, 
                    metalness: 0.2, 
                    roughness: 0.1, 
                    transmission: 0.5, 
                    thickness: 1.0,
                    transparent: true, 
                    opacity: 0.9,
                    emissive: this.color,
                    emissiveIntensity: 0.4
                });

                this.mesh = new THREE.Mesh(new RoundedBoxGeometry(2.4, 2.4, 2.4, 4, 0.2), mat);
                
                // Add Number Label
                const canvas = document.createElement('canvas');
                canvas.width = 512; canvas.height = 512;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'white';
                ctx.font = 'bold 300px Inter, Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText((index + 1).toString(), 256, 256);
                const numTex = new THREE.CanvasTexture(canvas);
                
                const numMat = new THREE.MeshBasicMaterial({ map: numTex, transparent: true, opacity: 0.9 });
                const numMesh = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 1.8), numMat);
                numMesh.position.z = 1.21;
                this.mesh.add(numMesh);

                this.mesh.castShadow = true; 
                scene.add(this.mesh); 
                this.reset(camera);
            }
            reset(camera) {
                const fh = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov)/2) * camera.position.z;
                const side = Math.random() > 0.5 ? 1 : -1;
                this.mesh.position.set(side * (fh * camera.aspect/2 + 3), -fh/2 - 2, -8);
                this.vel = new THREE.Vector3(-side * 0.12, Math.sqrt(2 * 0.008 * fh * 0.5), 0);
                this.mesh.visible = true;
            }
            update(camera) {
                this.vel.y -= 0.0048; this.mesh.position.add(this.vel);
                this.mesh.rotation.x += 0.02; this.mesh.rotation.y += 0.02;
                if(this.mesh.position.y < -15) this.reset(camera);
            }
        }

        // ==========================================
        // --- 4. MAIN GAME ENGINE ---
        // ==========================================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87ceeb, 0.005);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 2, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3; // IMPORTANT FIX
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const env = new EnvironmentManager(scene);
        const shooter = new ShooterManager(scene, camera);
        const cubes = Array.from({length: 3}, (_, i) => new ProjectileCube(scene, i, camera));

        // Audio
        const listener = new THREE.AudioListener(); camera.add(listener);
        const shootSound = new THREE.Audio(listener); const ambientSound = new THREE.Audio(listener); const thunderSound = new THREE.Audio(listener);
        const audioLoader = new THREE.AudioLoader();
        audioLoader.load(SOUND_EFFECTS.shot, b => shootSound.setBuffer(b));

        // Interaction
        const mouse = new THREE.Vector2();
        window.addEventListener('mousemove', e => {
            mouse.x = (e.clientX/window.innerWidth)*2-1; mouse.y = -(e.clientY/window.innerHeight)*2+1;
            document.getElementById('crosshair').style.left = e.clientX + 'px';
            document.getElementById('crosshair').style.top = e.clientY + 'px';
        });
        window.addEventListener('mousedown', () => shooter.shoot(mouse, shootSound));

        // Theme Cycle
        let current = THEMES.DAY, target = THEMES.DAY, lerp = 0;
        function cycleTheme() {
            const arr = Object.values(THEMES);
            target = arr[(arr.indexOf(target)+1)%arr.length]; lerp = 0;
            if(ambientSound.isPlaying) ambientSound.stop();
            audioLoader.load(target.sound, b => { ambientSound.setBuffer(b); ambientSound.setLoop(true); ambientSound.setVolume(0.4); ambientSound.play(); });
        }
        setInterval(cycleTheme, 60000); // 1 minute interval

        // Blasts
        const particles = [];
        function createBlast(pos, color) {
            for(let i=0; i<15; i++) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.3,0.3), new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.5 }));
                p.position.copy(pos); p.vel = new THREE.Vector3((Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8);
                p.life = 1.0; scene.add(p); particles.push(p);
            }
        }

        // Loop
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            if(lerp < 1) { lerp += 0.003; env.update(time, current, target, lerp); if(lerp>=1) current = target; }
            else env.update(time, current, target, 1);

            if(current.name === 'Cloudy Storm' && Math.random() > 0.992) {
                env.sunLight.intensity = 10;
                if(!thunderSound.isPlaying) audioLoader.load(SOUND_EFFECTS.thunder, b => { thunderSound.setBuffer(b); thunderSound.play(); });
            } else if(current.name === 'Cloudy Storm') env.sunLight.intensity = THREE.MathUtils.lerp(env.sunLight.intensity, target.light, 0.1);

            shooter.update(mouse);
            
            // Collision Check
            shooter.bullets.forEach(b => {
                cubes.forEach(c => {
                    if(c.mesh.visible && b.mesh.position.distanceTo(c.mesh.position) < 1.8) {
                        createBlast(c.mesh.position, c.color); c.mesh.visible = false;
                        setTimeout(() => c.reset(camera), 800); b.life = 0;
                    }
                });
            });

            for(let i=particles.length-1; i>=0; i--) {
                particles[i].position.add(particles[i].vel); particles[i].life -= 0.02; 
                particles[i].scale.setScalar(particles[i].life);
                if(particles[i].life <= 0) { scene.remove(particles[i]); particles.splice(i, 1); }
            }

            cubes.forEach(c => c.update(camera));
            renderer.render(scene, camera);
        }
        cycleTheme(); animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
