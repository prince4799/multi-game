<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rotating Cube - Basics</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --accent-color: #4dabf7;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
        }

        .ui-overlay h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--text-color);
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .ui-overlay p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            color: #666;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .btn {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            pointer-events: auto;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            background: white;
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="ui-overlay">
        <h1>3D Rotating Cube</h1>
        <p>Interactive Basics Demo</p>
    </div>

    <div id="canvas-container"></div>

    <div class="controls">
        <button class="btn" id="toggle-rotation">Pause Rotation</button>
        <button class="btn" id="change-color">Change Theme</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf8f9fa);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // Helper to create numbered texture
        function createNumberTexture(number, bgColor, textColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            // Background
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Border
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 20;
            ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);

            // Text
            ctx.fillStyle = textColor;
            ctx.font = 'bold 300px Inter, Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(number, canvas.width / 2, canvas.height / 2);

            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        // Cube Materials
        const cubeColors = {
            primary: '#212529', // Dark for contrast
            text: '#ffffff'
        };

        const materials = [
            new THREE.MeshStandardMaterial({ map: createNumberTexture('1', cubeColors.primary, cubeColors.text) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture('2', cubeColors.primary, cubeColors.text) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture('3', cubeColors.primary, cubeColors.text) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture('4', cubeColors.primary, cubeColors.text) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture('5', cubeColors.primary, cubeColors.text) }),
            new THREE.MeshStandardMaterial({ map: createNumberTexture('6', cubeColors.primary, cubeColors.text) })
        ];

        // Cube Mesh
        const geometry = new THREE.BoxGeometry(2, 2, 2);
        const cube = new THREE.Mesh(geometry, materials);
        scene.add(cube);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Animation State
        let isRotating = true;

        // UI Interactions
        document.getElementById('toggle-rotation').addEventListener('click', (e) => {
            isRotating = !isRotating;
            e.target.textContent = isRotating ? 'Pause Rotation' : 'Resume Rotation';
        });

        const themes = [
            { bg: 0xf8f9fa, cube: '#212529', text: '#ffffff' },
            { bg: 0xe7f5ff, cube: '#1971c2', text: '#ffffff' },
            { bg: 0xfff0f6, cube: '#c2255c', text: '#ffffff' },
            { bg: 0xf4fce3, cube: '#5c940d', text: '#ffffff' }
        ];
        let currentTheme = 0;

        document.getElementById('change-color').addEventListener('click', () => {
            currentTheme = (currentTheme + 1) % themes.length;
            const theme = themes[currentTheme];
            
            scene.background = new THREE.Color(theme.bg);
            document.body.style.backgroundColor = `#${theme.bg.toString(16)}`;
            
            materials.forEach((mat, index) => {
                mat.map = createNumberTexture((index + 1).toString(), theme.cube, theme.text);
                mat.needsUpdate = true;
            });
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            if (isRotating) {
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.01;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
