<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Memory Match</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e0e0ff;font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;gap:1rem}
h1{font-size:.9rem;letter-spacing:3px;color:#00f5ff;text-shadow:0 0 15px #00f5ff;text-transform:uppercase}
#info{font-size:.78rem;color:#8888aa;display:flex;gap:1.5rem}
#info b{color:#00f5ff}
#grid{display:grid;gap:8px;max-width:min(380px,95vw)}
.card{aspect-ratio:1;background:#1a1a35;border:2px solid rgba(0,245,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:clamp(1.2rem,5vw,1.8rem);cursor:pointer;transition:all .25s;user-select:none}
.card.face-up{background:#22224a;border-color:rgba(0,245,255,0.5);box-shadow:0 0 15px rgba(0,245,255,0.15)}
.card.matched{background:#0a2a1a;border-color:#00e676;box-shadow:0 0 15px rgba(0,230,118,0.3);cursor:default}
.card:active{transform:scale(.93)}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center}
#overlay.show{display:flex}
#obox{text-align:center;background:#111128;border:1px solid rgba(0,245,255,.3);border-radius:16px;padding:2rem;min-width:220px}
#obox h2{color:#00f5ff;font-size:1.2rem;margin-bottom:.5rem}
#obox p{color:#8888aa;font-size:.85rem;margin-bottom:1.2rem}
button{padding:10px 24px;background:#00f5ff;color:#0a0a1a;border:none;border-radius:8px;font-weight:700;font-size:.85rem;cursor:pointer;transition:opacity .2s}
button:hover{opacity:.85}mem
</style>
</head>
<body>
<h1>Memory Match</h1>
<div id="info"><span>Moves: <b id="moves">0</b></span><span>Pairs: <b id="pairs">0</b>/8</span><span>Time: <b id="time">0</b>s</span></div>
<div id="grid"></div>
<div id="overlay">
  <div id="obox">
    <h2>🎉 You Win!</h2>
    <p id="ores"></p>
    <button onclick="startGame()">Play Again</button>
  </div>
</div>
<script>
const emojis = ['🐍','🦋','🌟','🎮','🚀','🎯','🔥','🧩'];
let flipped = [], matched = 0, moves = 0, startTime, timer, canFlip = true;

function notify(type, data) { window.parent.postMessage({ type, ...data }, '*'); }
function shuffle(a) { for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function startGame() {
  matched = 0; moves = 0; flipped = []; canFlip = true;
  document.getElementById('moves').textContent = 0;
  document.getElementById('pairs').textContent = 0;
  document.getElementById('overlay').classList.remove('show');
  clearInterval(timer); startTime = Date.now();
  timer = setInterval(() => { document.getElementById('time').textContent = Math.floor((Date.now()-startTime)/1000); }, 1000);
  const deck = shuffle([...emojis, ...emojis]);
  const cols = 4;
  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = `repeat(${cols},1fr)`;
  grid.innerHTML = '';
  deck.forEach((e, i) => {
    const c = document.createElement('div');
    c.className = 'card'; c.dataset.emoji = e; c.textContent = '❓';
    c.addEventListener('click', () => flip(c));
    grid.appendChild(c);
  });
}

function flip(c) {
  if (!canFlip || c.classList.contains('matched') || flipped.includes(c)) return;
  c.classList.add('face-up'); c.textContent = c.dataset.emoji; flipped.push(c);
  if (flipped.length === 2) { canFlip = false; moves++; document.getElementById('moves').textContent = moves; setTimeout(check, 700); }
}

function check() {
  const [a, b] = flipped;
  if (a.dataset.emoji === b.dataset.emoji) {
    a.classList.add('matched'); b.classList.add('matched'); matched++;
    document.getElementById('pairs').textContent = matched;
    notify('SCORE_UPDATE', { score: matched });
    if (matched === emojis.length) {
      clearInterval(timer);
      const secs = Math.floor((Date.now()-startTime)/1000);
      const score = Math.max(100, 1000 - moves*10 - secs*2);
      notify('GAME_OVER', { score, best: score });
      document.getElementById('ores').textContent = `Moves: ${moves} · Time: ${secs}s · Score: ${score}`;
      document.getElementById('overlay').classList.add('show');
    }
  } else { a.classList.remove('face-up'); b.classList.remove('face-up'); a.textContent = '❓'; b.textContent = '❓'; }
  flipped = []; canFlip = true;
}

notify('GAME_READY', { title: 'Memory Match' });
startGame();
</script>
</body>
</html>
